<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahmoud Khalil - CV</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="Mahmoud I. Khalil - Senior Mobile Engineer (Android &amp; iOS) CV">
    <meta name="theme-color" content="#0F766E">
</head>
<body>
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="logo">
                <span class="letter-m">M</span>
                <span class="accent-dot"></span>
            </div>
            <div class="name-container">
                <span class="first-name">Mahmoud</span>
                <span class="last-name">Khalil</span>
            </div>
        </div>
    </div>
    <div id="loading-spinner" class="loading-spinner" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
            <circle cx="25" cy="25" r="20" stroke="#0F766E" stroke-width="4" fill="none" opacity="0.3"/>
            <circle cx="25" cy="25" r="20" stroke="#14B8A6" stroke-width="4" fill="none" stroke-linecap="round"
                    stroke-dasharray="90 125">
                <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                                  repeatCount="indefinite"/>
            </circle>
        </svg>
    </div>
    <script>
        setTimeout(function() {
            document.getElementById('splash-screen').style.opacity = '0';
            document.getElementById('loading-spinner').style.display = 'flex';
            setTimeout(function() {
                document.getElementById('splash-screen').style.display = 'none';
            }, 500);
        }, 1500);
    </script>
    <script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
